<section class="my-area">
  @if (authService.isLoggedIn() && hasAvailableData !== false) {
    @if (searchService.showSearchResults$ | async) {
      <app-tech-block
        [class.active]="searchService.searchActive$ | async"
        [attr.aria-hidden]="!(searchService.searchActive$ | async)"
        [context]="PageContextEnums.MY_AREA"
        [heading]="'Suchergebnisse'"
        [version]="'search-results'"
        [endPoint]="endPoint"
        [params]="languagesTechnologies"
      ></app-tech-block>
    }

    <app-tech-block
      [class.active]="!(searchService.searchActive$ | async)"
      [attr.aria-hidden]="searchService.searchActive$ | async"
      [context]="PageContextEnums.MY_AREA"
      [heading]="'Favoriten'"
      [version]="'favorites'"
      [endPoint]="endPoint"
      [params]="languagesTechnologies"
    ></app-tech-block>

    <app-tech-block
      [class.active]="!(searchService.searchActive$ | async)"
      [attr.aria-hidden]="searchService.searchActive$ | async"
      [context]="PageContextEnums.MY_AREA"
      [heading]="'Sprachen / Frameworks'"
      [version]="'default'"
      [endPoint]="endPoint"
      [params]="languages"
      (hasAvailableData)="handleHasAvailableData($event, 'languages')"
    ></app-tech-block>

    <app-tech-block
      [class.active]="!(searchService.searchActive$ | async)"
      [attr.aria-hidden]="searchService.searchActive$ | async"
      [context]="PageContextEnums.MY_AREA"
      [heading]="'Tools'"
      [version]="'default'"
      [endPoint]="endPoint"
      [params]="technologies"
      (hasAvailableData)="handleHasAvailableData($event, 'technologies')"
    ></app-tech-block>
  } @else if (authService.isLoggedIn() && hasAvailableData === false) {
    <app-action-placeholder
      [title]="'Mein Bereich'"
      [message]="'Du hast noch keine Beiträge erstellt. Erstelle deinen ersten Beitrag.'"
      [buttonText]="'Beitrag erstellen'"
      [buttonLink]="'/post-create'"
    ></app-action-placeholder>
  } @else {
    <app-action-placeholder
      [title]="'Mein Bereich'"
      [message]="'Bitte melde dich an, um deine Beiträge zu sehen.'"
      [buttonText]="'Anmelden'"
      [buttonLink]="'/login'"
    ></app-action-placeholder>
  }
</section>
