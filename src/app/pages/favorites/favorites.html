<section class="favorites">
  @if (authService.isLoggedIn() && hasAvailableData !== false) {
    @if (searchService.showSearchResults$ | async) {
      <app-tech-block
        [class.active]="searchService.searchActive$ | async"
        [attr.aria-hidden]="!(searchService.searchActive$ | async)"
        [context]="PageContextEnums.FAVORITES"
        [heading]="'Suchergebnisse'"
        [version]="'search-results'"
        [endPoint]="endPoint"
        [params]="languagesTechnologies"
      ></app-tech-block>
    }

    <app-tech-block
      [class.active]="!(searchService.searchActive$ | async)"
      [attr.aria-hidden]="searchService.searchActive$ | async"
      [context]="PageContextEnums.FAVORITES"
      [heading]="'Favoriten'"
      [version]="'favorites'"
      [endPoint]="endPoint"
      [params]="languagesTechnologies"
    ></app-tech-block>

    <app-tech-block
      [class.active]="!(searchService.searchActive$ | async)"
      [attr.aria-hidden]="searchService.searchActive$ | async"
      [context]="PageContextEnums.FAVORITES"
      [heading]="'Sprachen / Frameworks'"
      [version]="'default'"
      [endPoint]="endPoint"
      [params]="languages"
      (hasAvailableData)="handleHasAvailableData($event, 'languages')"
    ></app-tech-block>

    <app-tech-block
      [class.active]="!(searchService.searchActive$ | async)"
      [attr.aria-hidden]="searchService.searchActive$ | async"
      [context]="PageContextEnums.FAVORITES"
      [heading]="'Tools'"
      [version]="'default'"
      [endPoint]="endPoint"
      [params]="technologies"
      (hasAvailableData)="handleHasAvailableData($event, 'technologies')"
    ></app-tech-block>
  } @else if (authService.isLoggedIn() && hasAvailableData === false) {
    <app-action-placeholder
      class="center"
      [title]="'Noch keine Favoriten ?'"
      [message]="['Markiere interessante Beiträge mit einem Stern, damit du sie hier jederzeit schnell wiederfindest.']"
      [buttonText]="'Zur Community'"
      [buttonLink]="'/community'"
      [returnIcon]="'favorite_duck'"
    ></app-action-placeholder>
  } @else {
    <app-action-placeholder
      class="center translate-animation-left"
      [title]="'Hey, kommst du rein?'"
      [message]="['Melde dich an, um deine Favoriten zu sehen und genau da weiterzumachen, wo du aufgehört hast.']"
      [buttonText]="'Anmelden'"
      [buttonLink]="'/login'"
      [returnIcon]="'not_logged_in_duck'"
    ></app-action-placeholder>
  }
</section>
