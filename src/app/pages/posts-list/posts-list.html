<section class="posts-list-page">
  <aside class="query-bar">
    <section class="filter">
      <app-query-params-dropdown
        [label]="selectedEntity === 'languages' ? 'Tech-Stack' : selectedEntity === 'technologies' ? 'Tool' : 'Entität'"
        [key]="'entityValue'"
        [defaultValueLabel]="selectedEntityValue"
        [defaultValue]="selectedEntityValue"
        [enableSearch]="true"
        [endPoint]="endPoint"
        [params]="entityValueParams"
        [changeDetectionToken]="changeDetectionValue()"
      ></app-query-params-dropdown>

      <app-query-params-dropdown
        [label]="'Typen'"
        [key]="'postType'"
        [defaultValueLabel]="selectedPostType ? selectedPostType : 'Alle Typen'"
        [defaultValue]="selectedPostType ? selectedPostType : ''"
        [enableAllOption]="true"
        [enableSearch]="true"
        [endPoint]="endPoint"
        [params]="postTypeParams"
        [changeDetectionToken]="changeDetectionValue()"
      ></app-query-params-dropdown>

      <app-query-params-dropdown
        [label]="'Kategorie'"
        [key]="'category'"
        [defaultValueLabel]="selectedCategory ? selectedCategory : 'Alle Kategorien'"
        [defaultValue]="selectedCategory ? selectedCategory : ''"
        [enableAllOption]="true"
        [enableSearch]="true"
        [endPoint]="endPoint"
        [params]="categoryParams"
        [changeDetectionToken]="changeDetectionValue()"
      ></app-query-params-dropdown>

      <app-query-params-datepicker
        [label]="'Von'"
        [value]="selectedDateFrom"
        [key]="'dateFrom'"
        [min]="minDate"
        [max]="maxDate"
      ></app-query-params-datepicker>
      <app-query-params-datepicker
        [label]="'bis'"
        [value]="selectedDateTo"
        [key]="'dateTo'"
        [min]="minDate"
        [max]="maxDate"
      ></app-query-params-datepicker>
    </section>
    <section class="sort">
      <app-query-params-dropdown
        [label]="'Sortieren'"
        [key]="'sort'"
        [defaultValueLabel]="selectedSort ? selectedSort : 'Datum ↑'"
        [defaultValue]="selectedSort ? selectedSort : '-created_at'"
        [enableSearch]="true"
        [endPoint]="endPoint"
        [values]="{ '-created_at': 'Latest', created_at: 'Oldest', '-likes_count': 'Most Liked' }"
      >
      </app-query-params-dropdown>
    </section>
  </aside>

  <div
    #postListContainer
    class="posts-list"
  >
    @if (postsList.length === 0) {
      <p class="statusMessage">{{ statusMessage ? statusMessage : 'Daten werden geladen...' }}</p>
    } @else {
      @for (post of postsList; track $index) {
        <app-post-list-element
          [context]="context"
          [endPoint]="endPoint"
          [post]="post"
          [selectedEntity]="selectedEntity"
          [selectedEntityValue]="selectedEntityValue"
          [selectedPostType]="selectedPostType"
        ></app-post-list-element>
      }
    }
  </div>
  <app-page-pagination
    #paginationRef
    [paginationInfo]="paginationInfo"
  ></app-page-pagination>
</section>
