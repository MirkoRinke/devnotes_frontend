<section class="posts-list-page">
  <aside class="query-bar">
    <section class="filter">
      <app-query-params-dropdown
        [label]="'Tech-Stack'"
        [key]="'entityValue'"
        [defaultValueLabel]="selectedEntityValue"
        [defaultValue]="selectedEntityValue"
        [enableSearch]="true"
        [endPoint]="endPoint"
        [params]="entityValueParams"
        [changeDetectionToken]="changeDetectionValue()"
      ></app-query-params-dropdown>

      <app-query-params-dropdown
        [label]="'Typ'"
        [key]="'postType'"
        [defaultValueLabel]="selectedPostType"
        [defaultValue]="selectedPostType"
        [enableSearch]="true"
        [endPoint]="endPoint"
        [params]="postTypeParams"
        [changeDetectionToken]="changeDetectionValue()"
      ></app-query-params-dropdown>

      <app-query-params-dropdown
        [label]="'Kategorie'"
        [key]="'category'"
        [defaultValueLabel]="selectedCategory ? selectedCategory : 'Alle Kategorien'"
        [defaultValue]="selectedCategory ? selectedCategory : ''"
        [enableAllOption]="true"
        [enableSearch]="true"
        [endPoint]="endPoint"
        [params]="categoryParams"
        [changeDetectionToken]="changeDetectionValue()"
      ></app-query-params-dropdown>

      <app-query-params-datepicker
        [label]="'Von'"
        [value]="selectedDateFrom"
        [key]="'dateFrom'"
        [min]="minDate"
        [max]="maxDate"
      ></app-query-params-datepicker>
      <app-query-params-datepicker
        [label]="'bis'"
        [value]="selectedDateTo"
        [key]="'dateTo'"
        [min]="minDate"
        [max]="maxDate"
      ></app-query-params-datepicker>
    </section>
    <section class="sort">
      <app-query-params-dropdown
        [label]="'Sortieren'"
        [key]="'sort'"
        [defaultValueLabel]="selectedSort ? selectedSort : 'Datum ↑'"
        [defaultValue]="selectedSort ? selectedSort : '-created_at'"
        [enableSearch]="true"
        [endPoint]="endPoint"
        [values]="['created_at', '-created_at', '-likes_count', 'likes_count']"
      >
      </app-query-params-dropdown>
    </section>
  </aside>

  <div class="posts-list">
    @if (postsList.length === 0) {
      <p class="statusMessage">{{ statusMessage ? statusMessage : 'Daten werden geladen...' }}</p>
    } @else {
      @for (post of postsList; track $index) {
        <app-post-list-element
          [post]="post"
          [selectedEntityValue]="selectedEntityValue"
          [selectedPostType]="selectedPostType"
          [context]="context"
        ></app-post-list-element>
      }
    }
  </div>
  <app-page-pagination [paginationInfo]="paginationInfo"></app-page-pagination>
</section>
