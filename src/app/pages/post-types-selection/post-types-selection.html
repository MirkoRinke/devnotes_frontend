<section class="post-types-selection">
  <h2 class="heading">Beitragstyp</h2>

  <div class="tiles">
    @for (postType of filteredPostTypes; track $index) {
      <a
        class="tile"
        [routerLink]="'/posts-list'"
        [queryParams]="
          postType.name === 'All Types'
            ? {
                context: context,
                entity: selectedEntity,
                entityValue: selectedEntityValue,
                endPoint: endPoint,
              }
            : {
                context: context,
                entity: selectedEntity,
                entityValue: selectedEntityValue,
                endPoint: endPoint,
                postType: postType.name,
              }
        "
      >
        <div class="content">
          <span
            class="container"
            [innerHTML]="svgIconsService.returnIcon(postType.name, 'tile-icon')"
          ></span>
          <span class="name">{{ postType.name }}</span>
        </div>
        <p class="description">Lorem ipsum dolor sit amet consectetur adipisicing elit. Et nisi temporibus laborum est alias ipsa aut minus sunt nesciunt quas.</p>
        <span class="count">{{ postType.total_counts }}</span></a
      >
    }
  </div>
</section>

<!-- Load Description later by using the postType.name and fetching the description from a service or a predefined list -->
