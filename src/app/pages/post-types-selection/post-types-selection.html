<section class="post-types-selection">
  <h2 class="heading">Beitragstyp</h2>
  <div class="tiles">
    @for (postType of filteredPostTypes; track $index) {
      @let translatePath = 'PostTypes.' + postType.name + '.';

      <a
        class="tile"
        [routerLink]="'/posts-list'"
        [queryParams]="
          postType.name === 'all_types'
            ? {
                context: context,
                selectedEntity: selectedEntity,
                selectedEntityValue: selectedEntityValue,
                endPoint: endPoint,
              }
            : {
                context: context,
                selectedEntity: selectedEntity,
                selectedEntityValue: selectedEntityValue,
                endPoint: endPoint,
                selectedPostType: postType.name,
              }
        "
      >
        <div class="content">
          <span
            class="container"
            [innerHTML]="svgIconsService.returnIcon(postType.name, 'tile-icon')"
          ></span>
          <span class="name">{{ translatePath + 'title' | translate }}</span>
        </div>
        <p class="description">{{ translatePath + 'description' | translate }}</p>
        <span class="count">{{ postType.total_counts }}</span></a
      >
    }
  </div>
</section>
