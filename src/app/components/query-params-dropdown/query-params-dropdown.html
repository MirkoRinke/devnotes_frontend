@if (label != null && defaultValueLabel != null && defaultValue != null && mode != null) {
  <div class="dropdown-component">
    <div class="dropdown">
      <button
        type="button"
        [class.active]="filteredValues.length > 0"
        (click)="toggleDropdown()"
        aria-haspopup="listbox"
      >
        <span class="label"> {{ label }}: </span>

        <span class="selected-value">
          {{ values && values[defaultValueLabel] ? values[defaultValueLabel] : defaultValueLabel }}
        </span>
        <span
          class="chevron-icon"
          [class.active]="filteredValues.length > 0"
          [innerHTML]="svgIconsService.returnIcon('chevron')"
          [class.open]="showDropdownValues"
        ></span>
      </button>
    </div>

    @if (showDropdownValues) {
      <div
        class="values"
        [class.active]="showDropdownValues"
        [class.animated-in]="showAnimation"
        [class.animated-out]="!showAnimation"
        (animationend)="onAnimationEnd($event)"
        role="listbox"
      >
        @if (enableSearch) {
          <input
            type="text"
            class="search-input"
            placeholder="Search.."
            (input)="filterFunction($event.target.value)"
          />
        }

        @if (defaultValue !== '' && enableAllOption) {
          <button
            type="button"
            role="option"
            class="value"
            (click)="mode === 'URL' && key ? onSelectURL('', key) : onSelectComponent('')"
          >
            <span class="name">Alle {{ label }}</span>

            @if (showCount) {
              <span class="count">{{ totalCount > 0 ? totalCount : '' }}</span>
            }
          </button>
        }
        @for (value of filteredValues; track $index) {
          <button
            type="button"
            role="option"
            class="value"
            [title]="value.name"
            (click)="mode === 'URL' && key ? onSelectURL(value.name, key) : onSelectComponent(value.name)"
          >
            <span class="name">{{ values && values[value.name] ? values[value.name] : value.name }}</span>
            @if (showCount) {
              <span class="count">{{ value.total_counts ? value.total_counts : '' }}</span>
            }
          </button>
        }
      </div>
    }
  </div>
}
