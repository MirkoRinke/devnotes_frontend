<span>{{ label }}</span>
<select #dropdown (change)="onSelect(dropdown.value)">
  <option [value]="defaultValue">{{ defaultValueLabel }}</option>
  @for (value of dropdownValues; track $index) { @if ((valuesLabel ? valuesLabel[$index] : value)
  !== defaultValueLabel) {
  <option [value]="value">{{ valuesLabel ? valuesLabel[$index] : value }}</option>
  } }
</select>
