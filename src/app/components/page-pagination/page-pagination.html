@if (paginationInfo.last_page > 1) {
  <nav class="pagination">
    <!-- First Page -->
    <a
      class="first-page"
      [routerLink]="[]"
      [queryParams]="{ page: 1 }"
      [queryParamsHandling]="'merge'"
      [class.disabled]="paginationInfo.current_page === 1"
    >
      <span
        class="icon-container"
        [innerHTML]="svgIconsService.returnIcon('first_page')"
      ></span>
    </a>

    <!-- Previous Page -->
    <a
      class="previous-page"
      [routerLink]="[]"
      [queryParams]="{ page: paginationInfo.current_page - 1 }"
      [queryParamsHandling]="'merge'"
      [class.disabled]="paginationInfo.current_page === 1"
    >
      <span
        class="icon-container"
        [innerHTML]="svgIconsService.returnIcon('previous_page')"
      ></span>
    </a>

    <!-- Page Numbers (max 4, centered around current page) -->
    @for (page of getPages(); track $index) {
      <a
        class="page-number"
        [routerLink]="[]"
        [queryParams]="{ page: page }"
        [queryParamsHandling]="'merge'"
        [class.active]="page === paginationInfo.current_page"
        [class]="getDistanceClass(page)"
      >
        {{ page }}
      </a>
    }

    <!-- Next Page -->
    <a
      class="next-page"
      [routerLink]="[]"
      [queryParams]="{ page: paginationInfo.current_page + 1 }"
      [queryParamsHandling]="'merge'"
      [class.disabled]="paginationInfo.current_page === paginationInfo.last_page"
    >
      <span
        class="icon-container"
        [innerHTML]="svgIconsService.returnIcon('next_page')"
      ></span>
    </a>

    <!-- Last Page -->
    <a
      class="last-page"
      [routerLink]="[]"
      [queryParams]="{ page: paginationInfo.last_page }"
      [queryParamsHandling]="'merge'"
      [class.disabled]="paginationInfo.current_page === paginationInfo.last_page"
    >
      <span
        class="icon-container"
        [innerHTML]="svgIconsService.returnIcon('last_page')"
      ></span>
    </a>
  </nav>
}
