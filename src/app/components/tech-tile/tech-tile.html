<a class="link" [routerLink]="'/post-types-selection'" [queryParams]="{ entityValue: tile.name, endPoint: endPoint, entity: tile.entity, context: context }">
  <div class="tile-content">
    <span class="icon-container" [innerHTML]="svgIconsService.returnIcon(tile.name, 'tile-icon')"></span>
    <span>{{ tile.name }}</span>
  </div>
  <span class="count">{{ tile.total_counts }}</span>
</a>
