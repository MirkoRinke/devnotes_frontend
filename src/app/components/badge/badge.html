@if (getActiveBadge()) {
  <div
    class="badge {{ getActiveBadge()?.type }}"
    [class.center]="!caret || caret === 'center'"
    [class.left]="caret === 'left'"
    [class.right]="caret === 'right'"
    [style.--animation-delay]="animationDelay + 'ms'"
  >
    <span
      class="badge-text"
      #badgeText
      [class.is-overflowing-y]="isOverflowingY"
      [class.single-word]="isTranslationsPath"
      >{{ getActiveBadge()?.icon }} {{ getActiveBadge()?.text }}</span
    >
  </div>
}
