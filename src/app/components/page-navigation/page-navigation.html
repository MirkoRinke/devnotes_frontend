<nav class="page-navigation">
  <button
    class="search-button"
    [class.active]="searchService.enableSearch$ | async"
    (click)="toggleSearch()"
    [attr.aria-disabled]="!(searchService.enableSearch$ | async)"
    [disabled]="!(searchService.enableSearch$ | async)"
  >
    @if (hasSearchValue) {
      <button
        class="search-clear"
        (click)="$event.stopPropagation(); clearSearch()"
        [innerHTML]="svgIconsService.returnIcon('search_clear')"
      ></button>
    }

    <span
      [class.spin]="showSearch && !(searchService.dataLoaded$ | async)"
      [innerHTML]="svgIconsService.returnIcon(showSearch ? ((searchService.dataLoaded$ | async) ? 'search_close' : 'sync') : 'search')"
    ></span>
  </button>

  <div class="elements">
    <app-search
      [class.active]="showSearch && (searchService.dataLoaded$ | async) && delayedSearch"
      [class.animated-in]="showSearch && (searchService.dataLoaded$ | async) && delayedSearch"
      [class.animated-out]="!showSearch && delayedSearch"
      class="search"
      [attr.aria-hidden]="!showSearch"
    ></app-search>

    <div
      [class.active]="!showSearch || !(searchService.dataLoaded$ | async) || !delayedSearch"
      [class.animated-in]="!showSearch && delayedSearch"
      [class.animated-out]="showSearch && delayedSearch && (searchService.dataLoaded$ | async)"
      class="links"
      [attr.aria-hidden]="showSearch"
    >
      <a
        class="link"
        [routerLink]="'/my-area'"
        [class.active]="isActive('my-area')"
      >
        <span
          class="icon-container"
          [innerHTML]="svgIconsService.returnIcon('myArea')"
        ></span>
        Mein Bereich
      </a>
      <a
        class="link"
        [routerLink]="'/favorites'"
        [class.active]="isActive('favorites')"
      >
        <span
          class="icon-container"
          [innerHTML]="svgIconsService.returnIcon('favorites')"
        ></span>
        Favoriten
      </a>
      <a
        class="link"
        [routerLink]="'/network'"
        [class.active]="isActive('network')"
      >
        <span
          class="icon-container"
          [innerHTML]="svgIconsService.returnIcon('network')"
        ></span>
        Netzwerk
      </a>
      <a
        class="link"
        [routerLink]="'/community'"
        [class.active]="isActive('community')"
      >
        <span
          class="icon-container"
          [innerHTML]="svgIconsService.returnIcon('community')"
        ></span>
        Community</a
      >
    </div>
  </div>
</nav>
