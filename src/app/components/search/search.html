<div
  [attr.aria-disabled]="!(searchService.enableSearch$ | async)"
  class="search"
>
  @if ((searchService.cageIcon$ | async) !== null) {
    <span
      class="icon"
      [innerHTML]="svgIconsService.returnIcon((searchService.cageIcon$ | async) ?? '', 'cage')"
    ></span>
  }

  <input
    #searchInput
    type="text"
    class="search-input"
    [placeholder]="(searchService.searchMode$ | async) !== null ? 'Search by text or #tags...' : 'Search...'"
    label="Search"
    aria-label="Search"
    (input)="updateIndicators(searchInput.value)"
    (keydown.enter)="startSearch(searchInput.value)"
    [attr.aria-disabled]="!(searchService.enableSearch$ | async)"
  />

  <button
    class="start-search"
    (click)="startSearch(searchInput.value)"
    [innerHTML]="svgIconsService.returnIcon('send')"
    aria-label="Start Search"
  ></button>

  @if ((searchService.searchMode$ | async) !== null) {
    <div class="indicators">
      <span
        class="icon"
        [class.active]="hasText"
        [innerHTML]="svgIconsService.returnIcon('title_search')"
        aria-label="Title Search Indicator"
      ></span>
      <span
        class="icon"
        [class.active]="hasTags"
        [innerHTML]="svgIconsService.returnIcon('tags_search')"
        aria-label="Tags Search Indicator"
      ></span>
    </div>
  }
</div>
