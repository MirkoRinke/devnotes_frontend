<div class="tags">
  @for (tag of tags; track $index) {
    <button
      class="tag"
      [class.active]="isViewMode"
      type="button"
      [disabled]="!isViewMode"
      [title]="'View all posts with the tag ' + tag.name"
      [routerLink]="isViewMode ? '/posts-list' : null"
      [queryParams]="{
        context: context,
        endPoint: endPoint,
        entity: selectedEntity,
        entityValue: selectedEntityValue,
        postType: selectedPostType,
        searchTerm: '#' + tag.name,
      }"
    >
      {{ tag.name }}
    </button>
  }
</div>
