<div
  class="post-tech-stack-selector"
  (click)="$event.stopPropagation()"
>
  <div class="header">
    <h3 class="title">Pick Tech Stack</h3>
    <span
      class="icon"
      [innerHTML]="svgIconsService.returnIcon('close')"
      (click)="onClose()"
    ></span>
  </div>
  @if (filteredValues.length > 0) {
    <div class="content">
      @if (favoriteValues.length > 0) {
        <div class="favorites">
          @for (value of favoriteValues; track value.name) {
            <button
              class="value"
              [class.selected]="ifSelected(value)"
              (click)="toggleValue(value)"
            >
              <span
                class="icon"
                [innerHTML]="svgIconsService.returnIcon(value.name, 'favorite-icon')"
              ></span>
              <span class="name">
                {{ value.name }}
              </span>
            </button>
          }
        </div>
      }

      <div class="available">
        @for (value of filteredValues; track value.name) {
          <button
            class="value"
            [class.selected]="ifSelected(value)"
            (click)="toggleValue(value)"
          >
            <span
              class="icon"
              [innerHTML]="svgIconsService.returnIcon(value.name, 'available-icon')"
            ></span>
            <span class="name">
              {{ value.name }}
            </span>
          </button>
        }
      </div>
    </div>
    <button (click)="pushToControl()">Save</button>
  } @else {
    <div>
      <p>Loading...</p>
    </div>
  }
</div>
