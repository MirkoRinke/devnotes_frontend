<div class="tech-stack">
  @if (languages.length > 0) {
    <div class="languages">
      @for (language of languages; track language.id) {
        <button
          class="language"
          type="button"
          [title]="language.name"
          [innerHTML]="svgIconsService.returnIcon(language.name)"
          [routerLink]="'/posts-list'"
          [queryParams]="{
            context: context,
            endPoint: endPoint,
            entity: 'languages',
            entityValue: language.name,
            postType: selectedPostType,
          }"
        ></button>
      }
    </div>
  }

  @if (technologies.length > 0) {
    <div class="technologies">
      @for (technology of technologies; track technology.id) {
        <button
          class="technology"
          type="button"
          [title]="technology.name"
          [innerHTML]="svgIconsService.returnIcon(technology.name)"
          [routerLink]="'/posts-list'"
          [queryParams]="{
            context: context,
            endPoint: endPoint,
            entity: 'technologies',
            entityValue: technology.name,
            postType: selectedPostType,
          }"
        ></button>
      }
    </div>
  }
</div>
