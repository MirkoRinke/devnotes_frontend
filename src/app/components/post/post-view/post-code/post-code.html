<div class="code-container">
  <button
    class="copy-button"
    [class.copied]="isCopied"
    [class.copy-failed]="copiedFailed"
    (click)="copyToClipboard(code)"
    [innerHTML]="svgIconsService.returnIcon('copy')"
  ></button>
  <pre><code #codeElement [class]="language | prismLanguage">{{ code }}</code></pre>
</div>
