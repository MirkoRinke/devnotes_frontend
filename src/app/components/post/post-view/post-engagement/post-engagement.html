@if (post) {
  <div class="engagement">
    <div
      class="likes"
      [class.isOwner]="this.isOwner(post)"
      [class.isActive]="!this.authService.isLoggedIn()"
      (click)="toggleLike(post)"
    >
      <p class="count">{{ post.likes_count }}</p>

      <span
        class="icon"
        [class.isOwner]="this.isOwner(post)"
        [class.isLiked]="post.is_liked"
        [innerHTML]="svgIconsService.returnIcon(post.is_liked || this.isOwner(post) ? 'like' : 'like_outline', 'like')"
      ></span>
    </div>

    <div
      class="favorites"
      [class.isActive]="!this.authService.isLoggedIn()"
      (click)="toggleFavorites(post)"
    >
      <p class="count">{{ post.favorite_count }}</p>
      <span
        class="icon"
        [class.isFavorited]="post.is_favorited"
        [innerHTML]="svgIconsService.returnIcon(post.is_favorited ? 'favorite' : 'favorite_outline', 'favorite')"
      ></span>
    </div>

    <div
      class="shares"
      (click)="sharePost()"
    >
      <span
        class="icon"
        [class.copied]="isCopied"
        [class.copy-failed]="copiedFailed"
        [innerHTML]="svgIconsService.returnIcon('share', 'share')"
      ></span>
    </div>
  </div>
}
