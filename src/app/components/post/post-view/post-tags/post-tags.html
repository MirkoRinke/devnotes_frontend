<div class="tags">
  @for (tag of tags; track $index) {
    <button
      class="tag"
      type="button"
      [routerLink]="'/posts-list'"
      [queryParams]="{
        context: context,
        endPoint: endPoint,
        entity: selectedEntity,
        entityValue: selectedEntityValue,
        postType: selectedPostType,
        searchTerm: '#' + tag.name,
      }"
    >
      {{ tag.name }}
    </button>
  }
</div>
