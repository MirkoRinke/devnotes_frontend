<article class="post">
  <header class="header">
    <div class="system-bar">
      <div class="version">
        <!-- Aktuelles Datum anzeigen -->

        <!-- Dropdown (Single-Select) für PostType -->

        <!-- Dropdown (Single-Select) für Category -->
      </div>
      <!-- Setting für Status (Entwurf, veröffentlicht, archiviert) -->
    </div>

    <div class="info-bar">
      <!-- UserBadge -->

      <!-- Engagement (Likes, Favorites, Share) Icons mit placeholder Count 0 -->
    </div>
  </header>

  <section class="content">
    <!-- Formularfeld für Titel -->
    <!-- Formularfeld für Beschreibung -->
    <!-- Formularfeld für Code, wenn möglich mit Live ( oder kleinem debouncing ) Syntax Highlighting -->
  </section>

  <footer class="footer">
    <div class="footer-meta">
      <!-- Modal für Tech Stack (Sprachen/Frameworks und Tools) 
       Im Modal sind die Sprachen/Frameworks und Tools mit Icon und Name aufgelistet,
      die der Nutzer auswählen kann. Es können mehrere Sprachen/Frameworks und Tools ausgewählt werden.        
       -->

      <!-- Modal für Media Links (Images, Videos, Resources) 
       Im Modal können die Links eingegeben und verwaltet werden.
       Nach eingabe vom ersten Link, erscheint ein weiteres Feld für den nächsten Link usw.
       Es können beliebig viele Links hinzugefügt werden-->
    </div>

    <span class="line-break"></span>
    <!-- Formularfeld für Tags, nach Bestätigung wird der tag gleich anzeigt, es können auch mehre tags auf einmal angeben werden.  
     Example: Angular, JavaScript, Webentwicklung, etc.
     -->

    <!-- Buttons für Speichern, Veröffentlichen, Abbrechen -->
  </footer>

  <!-- Modals -->
</article>
