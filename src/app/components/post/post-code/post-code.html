<div
  class="code-container"
  [class.expanded]="isExpanded"
>
  <div
    class="code-header"
    (click)="control ? setViewMode(false) : null"
  >
    <button
      class="copy-button"
      [class.copied]="isCopied"
      [class.copy-failed]="copiedFailed"
      (mousedown)="copyToClipboard(code); $event.preventDefault()"
      [innerHTML]="svgIconsService.returnIcon('copy')"
    ></button>
    <button
      class="expand-collapse-button"
      (mousedown)="toggleExpanded(); $event.preventDefault()"
      [innerHTML]="svgIconsService.returnIcon(isExpanded ? 'collapse' : 'expand')"
    ></button>
  </div>

  <!--TODO Temporary error badge, make dynamic later -->
  @if (errorIndex) {
    <div class="error">[!] E{{ errorIndex }}</div>
  }

  @if (isViewMode) {
    <pre
      class="code-view"
      [class.ng-valid]="control?.valid"
      [class.ng-invalid]="control?.invalid"
      [class.ng-pending]="control?.pending"
      [class.ng-touched]="control?.touched"
      [class.ng-untouched]="control?.untouched"
      [class.ng-dirty]="control?.dirty"
      [class.ng-pristine]="control?.pristine"
      (click)="control ? setViewMode(false) : null"
    ><code #codeElement [class]="language | prismLanguage" [class.empty]="!code">{{ code ? code : 'Code hier eingeben' }}</code></pre>
  } @else if (control) {
    <textarea
      (blur)="setViewMode(true)"
      class="code-textarea code-view"
      [placeholder]="'Code hier eingeben'"
      name="code-textarea"
      #codeTextarea
      (input)="adjustHeight()"
      type="text"
      [maxlength]="65535"
      [formControl]="control"
    ></textarea>
  }
</div>
